# NOTE: per repo policy, pin these actions to commit SHAs before merging
# (see commit "pin GitHub actions to specific commit SHA").
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::these files are not gofmt'd:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (unit + golden)
        run: go test ./... -count=1

      - name: generation is up to date
        run: |
          go generate ./...
          if ! git diff --quiet -- internal/commands/generated; then
            echo "::error::generated commands are stale; run 'go generate ./...' and commit"
            git --no-pager diff -- internal/commands/generated | head -100
            exit 1
          fi

      - name: smoke test
        run: |
          go build -o /tmp/gr4vy .
          /tmp/gr4vy version
          /tmp/gr4vy --help >/dev/null
          /tmp/gr4vy transactions list --help >/dev/null

  # Stable required check for branch protection.
  ci-complete:
    needs: [build-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: verify
        run: |
          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "ci failed"; exit 1
          fi
