# Live e2e suite against the shared sandbox (api.sandbox.e2e.gr4vy.app),
# mirroring the gr4vy SDK repos. Skips when PRIVATE_KEY is unavailable (fork PRs,
# or before the secret is configured). Set the repo variable REQUIRE_E2E=true to
# fail instead of skip on trusted refs once the secret exists.
name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 8 * * 1-5" # weekday mornings, matching the SDKs
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run e2e suite
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
          IS_DEPENDABOT: ${{ github.actor == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot[bot]' }}
          REQUIRE_E2E: ${{ vars.REQUIRE_E2E }}
        run: |
          if [ -z "$PRIVATE_KEY" ]; then
            # Fork and Dependabot PRs run without repo secrets, so the live suite
            # can't run there — skip rather than fail.
            if [ "$REQUIRE_E2E" = "true" ] && [ "$IS_FORK_PR" != "true" ] && [ "$IS_DEPENDABOT" != "true" ]; then
              echo "::error::PRIVATE_KEY is not set on a trusted ref (REQUIRE_E2E=true)."
              exit 1
            fi
            echo "::warning::PRIVATE_KEY not available — skipping live e2e suite."
            exit 0
          fi
          go test ./test/... -count=1 -v
