# Self-maintenance: when a new gr4vy-go SDK is published, bump it, regenerate the
# command surface from its types, and open a draft PR for review. The command
# surface is derived entirely from the SDK, so there is no spec trigger.
name: regen

on:
  repository_dispatch:
    types: [sdk_updated]
  schedule:
    - cron: "0 1 * * *" # safety net, offset after gr4vy-go's own regen
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Use a token whose pushes trigger CI on the resulting PR.
          token: ${{ secrets.DISPATCH_ACCESS_TOKEN }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Bump gr4vy-go
        run: |
          go get -u github.com/gr4vy/gr4vy-go@latest
          go mod tidy

      - name: Regenerate commands
        run: go generate ./...

      - name: Update golden
        run: go test ./internal/cli -run TestCommandTreeSnapshot -update || true

      - name: Build & test
        run: |
          go build ./...
          go test ./... -count=1

      - name: Open draft PR
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.DISPATCH_ACCESS_TOKEN }}
          branch: auto/regen
          draft: true
          title: "feat: regenerate command surface from latest gr4vy-go"
          commit-message: "feat: regenerate command surface from latest gr4vy-go"
          body: |
            Automated regeneration triggered by a new gr4vy-go release.

            - Bumped `github.com/gr4vy/gr4vy-go`
            - Regenerated `internal/commands/generated` from the SDK types

            Review the command-tree golden diff before marking ready.
          labels: automated, sdk-sync

      - name: Notify Slack on failure
        if: failure()
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2
        env:
          SLACK_CHANNEL: sdk-updates
          SLACK_WEBHOOK: ${{ secrets.SLACK_SDK_WEBHOOK_URL }}
          SLACK_MESSAGE: "gr4vy-cli regen workflow failed"
