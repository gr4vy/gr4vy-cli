version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: saturday
    labels:
      - dependencies
    open-pull-requests-limit: 5
    commit-message:
      # Trigger a patch release for dependency bumps.
      prefix: "deps"
    groups:
      go-dependencies:
        patterns:
          - "*"
    ignore:
      # gr4vy-go is bumped by the regen workflow, not Dependabot.
      - dependency-name: github.com/gr4vy/gr4vy-go

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
