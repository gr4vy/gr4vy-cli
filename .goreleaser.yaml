version: 2

project_name: gr4vy

before:
  hooks:
    - go mod tidy

builds:
  - id: gr4vy
    main: .
    binary: gr4vy
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: gr4vy
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc

# Homebrew tap (requires the gr4vy/homebrew-tap repo and HOMEBREW_TAP_TOKEN).
brews:
  - name: gr4vy
    repository:
      owner: gr4vy
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/gr4vy/gr4vy-cli"
    description: "The Gr4vy command-line interface"
    license: "MIT"
    test: |
      system "#{bin}/gr4vy version"

# Scoop bucket for Windows (optional; requires gr4vy/gr4vy-scoop-bucket).
scoops:
  - repository:
      owner: gr4vy
      name: gr4vy-scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/gr4vy/gr4vy-cli"
    description: "The Gr4vy command-line interface"
    license: MIT

release:
  draft: false
  prerelease: auto
